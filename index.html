<!DOCTYPE html>
<html>
<head>
  <title>Pruthvi Raj Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial';
      background: linear-gradient(135deg, #0b1020, #1a1f3c);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      color: #00e5ff;
      text-shadow: 0 0 15px #00e5ff;
      margin-top: 30px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      margin: 15px;
      width: 250px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,229,255,0.2);
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00e5ff;
    }

    .title {
      font-size: 22px;
      color: #00e5ff;
      margin-bottom: 10px;
    }

    .footer {
      margin-top: 40px;
      padding: 20px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<h1>🏐 Pruthvi Raj</h1>
<p>Aspiring Full Stack Developer | India 🇮🇳 → Japan 🇯🇵</p>

<div class="container">

  <div class="card">
    <div class="title">🚀 Projects</div>
    <p>Green Habit Tracker</p>
    <p>Volleyball Simulator</p>
  </div>

  <div class="card">
    <div class="title">🛠 Skills</div>
    <p>HTML, CSS, JavaScript</p>
    <p>Python</p>
  </div>

  <div class="card">
    <div class="title">🎯 Goal</div>
    <p>Work as a developer in Japan 🇯🇵</p>
  </div>

</div>

<div class="footer">
  ✨ Built with passion for coding & anime ✨
</div>

</body>
</html>
