<!DOCTYPE html>
<html>
<head>
  <title>Pruthvi Raj Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    /* 🌌 Stars */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(white 1px, transparent 1px);
      background-size: 40px 40px;
      animation: stars 20s linear infinite;
      opacity: 0.2;
      z-index: -1;
    }

    @keyframes stars {
      from { transform: translate(0,0); }
      to { transform: translate(-200px,-200px); }
    }

    h1 {
      color: #00e5ff;
      text-shadow: 0 0 25px #00e5ff;
      margin-top: 30px;
    }

    .xp-bar {
      width: 60%;
      height: 20px;
      background: #333;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    .xp-fill {
      height: 100%;
      width: 10%;
      background: linear-gradient(90deg,#00e5ff,#00ff88);
      transition: 0.3s;
    }

    .level {
      color: #00ff88;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      background: #00e5ff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background: #00ff88;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      width: 260px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #00e5ff;
    }

  </style>
</head>

<body>

<h1>🏐 Pruthvi Raj</h1>
<p>🎮 Developer | India 🇮🇳 → Japan 🇯🇵</p>

<div class="level" id="level">Level 1</div>

<div class="xp-bar">
  <div class="xp-fill" id="xp"></div>
</div>

<button onclick="gainXP()">⚡ Gain XP</button>

<div class="container">

  <div class="card">
    <h3>🎮 Habit Tracker</h3>
    <p>Gamified habit system</p>
  </div>

  <div class="card">
    <h3>🏐 Volleyball Simulator</h3>
    <p>Anime-inspired game</p>
  </div>

</div>

<script>
let xp = 10;
let level = 1;

function gainXP() {
  xp += 10;

  if (xp >= 100) {
    xp = 10;
    level++;
    alert("LEVEL UP 🚀");
  }

  document.getElementById("xp").style.width = xp + "%";
  document.getElementById("level").innerText = "Level " + level;
}
</script>

</body>
</html>
