<!DOCTYPE html>
<html>
<head>
  <title>Pruthvi Raj Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1020;
      color: white;
      text-align: center;
    }

    h1 {
      color: #00e5ff;
      text-shadow: 0 0 20px #00e5ff;
      margin-top: 30px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1a1f3c;
      border-radius: 15px;
      margin: 15px;
      width: 300px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00e5ff;
    }

    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
    }

    .title {
      font-size: 20px;
      color: #00e5ff;
      margin-bottom: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #00e5ff;
      cursor: pointer;
    }

    button:hover {
      background: #00ff88;
    }

  </style>
</head>

<body>

<h1>🏐 Pruthvi Raj</h1>
<p>Developer | India 🇮🇳 → Japan 🇯🇵</p>

<div class="container">

  <div class="card">
    <img src="habit.png">
    <div class="content">
      <div class="title">🎮 Habit Tracker</div>
      <p>Gamified habit tracker with XP & streak system.</p>
      <button onclick="window.open('https://github.com/Pruthviraj2006')">GitHub</button>
    </div>
  </div>

  <div class="card">
    <img src="volleyball.png">
    <div class="content">
      <div class="title">🏐 Volleyball Simulator</div>
      <p>Anime-style volleyball game UI & logic.</p>
      <button onclick="window.open('https://github.com/Pruthviraj2006')">GitHub</button>
    </div>
  </div>

</div>

</body>
</html>
